<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PeakRDL-check</title>
<style>
:root {
  --bg: #ffffff; --fg: #1a1a2e; --muted: #6b7280; --line: #e5e7eb;
  --accent: #2563eb; --accent-bg: #eff6ff; --mono: ui-monospace, SFMono-Regular, Menlo, monospace;
  --breaking: #dc2626; --behavioural: #d97706; --compatible: #16a34a;
  --documentation: #6b7280; --informational: #2563eb; --uncertain: #9333ea;
}
@media (prefers-color-scheme: dark) {
  :root { --bg: #0f1117; --fg: #e5e7eb; --muted: #9ca3af; --line: #262a35;
          --accent: #60a5fa; --accent-bg: #172036; }
}
* { box-sizing: border-box; }
body { margin: 0; font: 14px/1.45 system-ui, sans-serif; background: var(--bg); color: var(--fg); height: 100vh; display: flex; flex-direction: column; }
header { display: flex; gap: 12px; align-items: center; padding: 8px 14px; border-bottom: 1px solid var(--line); }
header h1 { font-size: 15px; margin: 0; white-space: nowrap; }
header .meta { color: var(--muted); font-size: 12px; white-space: nowrap; }
#search { flex: 1; max-width: 480px; padding: 6px 10px; border: 1px solid var(--line); border-radius: 6px; background: var(--bg); color: var(--fg); font-size: 13px; }
#addr-filter { width: 220px; padding: 6px 10px; border: 1px solid var(--line); border-radius: 6px; background: var(--bg); color: var(--fg); font: 12px var(--mono); }
main { flex: 1; display: flex; min-height: 0; }
#left { width: 46%; min-width: 320px; border-right: 1px solid var(--line); display: flex; flex-direction: column; min-height: 0; }
#tabs { display: flex; border-bottom: 1px solid var(--line); }
#tabs button { flex: 1; padding: 6px; border: 0; background: none; color: var(--muted); cursor: pointer; font-size: 12px; border-bottom: 2px solid transparent; }
#tabs button.active { color: var(--accent); border-bottom-color: var(--accent); }
#list { flex: 1; overflow-y: auto; position: relative; outline: none; }
#list .spacer { position: relative; }
.row { position: absolute; left: 0; right: 0; height: 28px; display: flex; align-items: center; gap: 6px; padding: 0 10px; cursor: pointer; white-space: nowrap; overflow: hidden; }
.row:hover, .row.selected { background: var(--accent-bg); }
.row .twisty { width: 14px; color: var(--muted); flex: none; font-size: 10px; }
.row .kind { font-size: 10px; color: var(--muted); text-transform: uppercase; flex: none; width: 52px; }
.row .name { font-family: var(--mono); font-size: 12.5px; overflow: hidden; text-overflow: ellipsis; }
.row .addr { margin-left: auto; font: 11px var(--mono); color: var(--muted); flex: none; }
.row .sev { flex: none; font-size: 10px; padding: 1px 6px; border-radius: 8px; color: #fff; }
#detail { flex: 1; overflow-y: auto; padding: 16px 20px; min-width: 0; }
#detail h2 { font: 600 15px var(--mono); margin: 0 0 2px; word-break: break-all; }
#detail .sub { color: var(--muted); font-size: 12px; margin-bottom: 12px; }
table { border-collapse: collapse; width: 100%; margin: 10px 0; font-size: 12.5px; }
th, td { border: 1px solid var(--line); padding: 4px 8px; text-align: left; vertical-align: top; }
th { background: var(--accent-bg); font-weight: 600; }
td.mono, .mono { font-family: var(--mono); font-size: 12px; }
.bits { white-space: nowrap; }
.desc { color: var(--muted); }
.status { padding: 20px; color: var(--muted); }
.error { color: var(--breaking); }
.chip { display: inline-block; font-size: 11px; border: 1px solid var(--line); border-radius: 10px; padding: 1px 8px; margin-right: 6px; color: var(--muted); }
#filters { padding: 6px 10px; border-bottom: 1px solid var(--line); display: none; flex-wrap: wrap; gap: 4px; }
#filters label { font-size: 11px; display: inline-flex; gap: 3px; align-items: center; margin-right: 8px; cursor: pointer; }
.loadmore { position: absolute; left: 0; right: 0; height: 28px; display: flex; align-items: center; justify-content: center; color: var(--accent); cursor: pointer; font-size: 12px; }
a { color: var(--accent); }
kbd { border: 1px solid var(--line); border-radius: 3px; padding: 0 4px; font-size: 11px; }
</style>
</head>
<body>
<header>
  <h1>PeakRDL-check</h1>
  <input id="search" type="search" placeholder="Search registers, fields, descriptions… (/)js" aria-label="Search">
  <input id="addr-filter" type="text" placeholder="addr range: 0x1000:0x2fff" aria-label="Address range filter">
  <span class="meta" id="meta-line">loading…</span>
</header>
<main>
  <div id="left">
    <div id="tabs" role="tablist">
      <button id="tab-tree" class="active" role="tab">Hierarchy</button>
      <button id="tab-results" role="tab">Results</button>
      <button id="tab-changes" role="tab">Changes</button>
    </div>
    <div id="filters"></div>
    <div id="list" tabindex="0" role="listbox" aria-label="Entities"><div class="spacer"></div></div>
  </div>
  <div id="detail"><div class="status">Select an entity, search, or paste a deep link.</div></div>
</main>
<script src="viewer.js"></script>
</body>
</html>
