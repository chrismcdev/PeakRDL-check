<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PeakRDL-check</title>
<style>
:root {
  --bg: #ffffff; --fg: #1a1a2e; --muted: #6b7280; --line: #e5e7eb;
  --accent: #2563eb; --accent-bg: #eff6ff; --mono: ui-monospace, SFMono-Regular, Menlo, monospace;
  --breaking: #dc2626; --behavioural: #d97706; --compatible: #16a34a;
  --documentation: #6b7280; --informational: #2563eb; --uncertain: #9333ea;
  --change-added: #16a34a; --change-removed: #dc2626; --change-modified: #d97706;
  --field-1: #2563eb; --field-2: #0f9f6e; --field-3: #a855f7; --field-4: #0891b2;
  --field-5: #db2777; --field-6: #4f46e5; --field-7: #65a30d; --field-8: #c2410c;
}
@media (prefers-color-scheme: dark) {
  :root { --bg: #0f1117; --fg: #e5e7eb; --muted: #9ca3af; --line: #262a35;
          --accent: #60a5fa; --accent-bg: #172036; }
}
* { box-sizing: border-box; }
body { margin: 0; font: 14px/1.45 system-ui, sans-serif; background: var(--bg); color: var(--fg); height: 100vh; display: flex; flex-direction: column; }
header { display: flex; gap: 12px; align-items: center; padding: 8px 14px; border-bottom: 1px solid var(--line); }
header h1 { font-size: 15px; margin: 0; white-space: nowrap; }
header .meta { color: var(--muted); font-size: 12px; white-space: nowrap; }
#search { flex: 1; max-width: 480px; padding: 6px 10px; border: 1px solid var(--line); border-radius: 6px; background: var(--bg); color: var(--fg); font-size: 13px; }
#addr-filter { width: 220px; padding: 6px 10px; border: 1px solid var(--line); border-radius: 6px; background: var(--bg); color: var(--fg); font: 12px var(--mono); }
main { flex: 1; display: flex; min-height: 0; }
#left { width: 46%; min-width: 280px; flex: none; display: flex; flex-direction: column; min-height: 0; }
#splitter { position: relative; width: 7px; flex: none; cursor: col-resize; touch-action: none; outline: none; }
#splitter::before { content: ""; position: absolute; inset: 0 auto 0 0; width: 1px; background: var(--line); transition: background .12s, width .12s; }
#splitter:hover::before, #splitter:focus-visible::before, body.resizing #splitter::before { width: 3px; background: var(--accent); }
body.resizing { cursor: col-resize; user-select: none; }
#tabs { display: flex; border-bottom: 1px solid var(--line); }
#tabs button { flex: 1; padding: 6px; border: 0; background: none; color: var(--muted); cursor: pointer; font-size: 12px; border-bottom: 2px solid transparent; }
#tabs button.active { color: var(--accent); border-bottom-color: var(--accent); }
#list { flex: 1; overflow-y: auto; position: relative; outline: none; }
#list .spacer { position: relative; }
.row { position: absolute; left: 0; right: 0; height: 28px; display: flex; align-items: center; gap: 6px; padding: 0 10px; cursor: pointer; white-space: nowrap; overflow: hidden; }
.row:hover, .row.selected { background: var(--accent-bg); }
.row .twisty { width: 14px; color: var(--muted); flex: none; font-size: 10px; }
.row .kind { font-size: 10px; color: var(--muted); text-transform: uppercase; flex: none; width: 52px; }
.row .name { font-family: var(--mono); font-size: 12.5px; overflow: hidden; text-overflow: ellipsis; }
.row .addr { margin-left: auto; font: 11px var(--mono); color: var(--muted); flex: none; }
.row .sev { flex: none; font-size: 10px; padding: 1px 6px; border-radius: 8px; color: #fff; }
.row .impact { flex: none; font-size: 10px; line-height: 16px; min-width: 18px; padding: 0 5px; border-radius: 9px; color: #fff; text-align: center; }
.row .impact.descendant { background: transparent !important; border: 1px solid currentColor; line-height: 14px; }
#detail { flex: 1; overflow-y: auto; padding: 16px 20px; min-width: 0; }
#detail h2 { font: 600 15px var(--mono); margin: 0 0 6px; word-break: break-all; }
#detail h3 { font-size: 13px; margin: 18px 0 6px; }
#detail .sub { color: var(--muted); font-size: 12px; margin-bottom: 12px; }
table { border-collapse: collapse; width: 100%; margin: 10px 0; font-size: 12.5px; }
th, td { border: 1px solid var(--line); padding: 4px 8px; text-align: left; vertical-align: top; }
th { background: var(--accent-bg); font-weight: 600; }
td.mono, .mono { font-family: var(--mono); font-size: 12px; }
.bits { white-space: nowrap; }
.desc { color: var(--muted); }
.status { padding: 20px; color: var(--muted); }
.error { color: var(--breaking); }
.chip { display: inline-block; font-size: 11px; border: 1px solid var(--line); border-radius: 10px; padding: 1px 8px; margin-right: 6px; color: var(--muted); }
.change-summary { border: 1px solid var(--line); border-radius: 7px; margin: 12px 0 16px; overflow: hidden; }
.change-summary-title { padding: 7px 10px; font-size: 12px; font-weight: 600; background: var(--accent-bg); border-bottom: 1px solid var(--line); }
.change-item { display: grid; grid-template-columns: auto minmax(0, 1fr); gap: 7px; padding: 7px 10px; border-bottom: 1px solid var(--line); font-size: 12px; }
.change-item:last-child { border-bottom: 0; }
.change-message { min-width: 0; }
.change-values { color: var(--muted); font: 11px var(--mono); margin-top: 2px; overflow-wrap: anywhere; }
.change-badge { align-self: start; color: #fff; border-radius: 9px; padding: 1px 7px; font-size: 10px; line-height: 1.5; text-transform: uppercase; }
.change-badge.added { background: var(--change-added); }
.change-badge.removed { background: var(--change-removed); }
.change-badge.modified { background: var(--change-modified); }
.bitfield { margin: 8px 0 14px; max-width: 1100px; }
.bitfield svg { display: block; width: 100%; height: auto; min-height: 58px; }
.bit-lane { fill: var(--accent-bg); stroke: var(--line); }
.bit-tick { fill: var(--muted); font: 9px var(--mono); }
.bit-label { fill: #fff; font: 600 10px var(--mono); pointer-events: none; }
.bit-segment { cursor: pointer; }
.bit-segment rect { stroke: var(--bg); stroke-width: 2; }
.bit-segment:hover rect { filter: brightness(1.08); }
.bit-segment.added rect { fill: var(--change-added) !important; stroke: var(--change-added); stroke-width: 3; }
.bit-segment.removed rect { fill: var(--change-removed) !important; fill-opacity: .45; stroke: var(--change-removed); stroke-width: 3; stroke-dasharray: 6 3; }
.bit-segment.removed.ghost rect { fill: transparent !important; fill-opacity: 1; }
.bit-segment.modified rect { fill: var(--change-modified) !important; stroke: var(--change-modified); stroke-width: 3; }
.bit-segment.trouble rect { stroke: var(--breaking); stroke-dasharray: 5 3; }
.bitfield-legend { display: flex; flex-wrap: wrap; gap: 10px; color: var(--muted); font-size: 11px; margin-top: 5px; }
.legend-key { display: inline-flex; align-items: center; gap: 4px; }
.legend-swatch { width: 10px; height: 10px; border-radius: 2px; display: inline-block; }
.bitfield-note { color: var(--muted); font-size: 11px; margin: 5px 0 0; }
.field-change-row td { padding: 5px 8px 7px 32px; background: color-mix(in srgb, var(--accent-bg) 55%, transparent); border-top: 0; }
.field-change-row .change-item { display: flex; align-items: flex-start; padding: 2px 0; border: 0; }
.changed-field td { border-bottom: 0; }
.field-state { display: inline-block; width: 7px; height: 7px; border-radius: 50%; margin-right: 6px; vertical-align: middle; }
.field-state.added { background: var(--change-added); }
.field-state.removed { background: var(--change-removed); }
.field-state.modified { background: var(--change-modified); }
.field-focus { outline: 2px solid var(--accent); outline-offset: -2px; }
.overview-head { display: flex; align-items: baseline; justify-content: space-between; gap: 12px; margin-bottom: 12px; }
.overview-head h2 { font-family: system-ui, sans-serif !important; font-size: 18px !important; }
.overview-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(145px, 1fr)); gap: 10px; margin: 10px 0 18px; }
.metric-card { appearance: none; display: flex; align-items: center; justify-content: space-between; gap: 12px; min-width: 0; min-height: 52px; padding: 10px 12px; color: inherit; text-align: left; background: var(--bg); border: 1px solid var(--line); border-radius: 8px; }
button.metric-card { cursor: pointer; }
button.metric-card:hover { background: var(--accent-bg); }
button.metric-card:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
.metric-value { order: 2; display: inline-flex; align-items: center; justify-content: center; min-width: 30px; height: 24px; padding: 0 8px; color: var(--metric-color, var(--fg)); background: color-mix(in srgb, var(--metric-color, var(--accent)) 10%, transparent); border: 1px solid color-mix(in srgb, var(--metric-color, var(--accent)) 28%, var(--line)); border-radius: 12px; font: 600 12px/1 var(--mono); }
.metric-label { order: 1; min-width: 0; overflow: hidden; color: var(--fg); font-size: 12px; font-weight: 600; line-height: 1.25; text-overflow: ellipsis; text-transform: capitalize; white-space: nowrap; }
.overview-columns { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 16px; }
.overview-panel { border: 1px solid var(--line); border-radius: 8px; padding: 11px 12px; min-width: 0; }
.overview-panel h3 { margin: 0 0 8px !important; }
.summary-row { display: grid; grid-template-columns: minmax(0, 1fr) auto; gap: 12px; align-items: center; padding: 5px 0; border-bottom: 1px solid var(--line); }
.summary-row:last-child { border-bottom: 0; }
.summary-label { min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font: 12px var(--mono); }
.summary-count { color: var(--muted); font: 12px var(--mono); }
.composition { display: flex; height: 12px; border-radius: 6px; overflow: hidden; background: var(--line); margin: 7px 0 10px; }
.composition span { min-width: 2px; }
.address-map { margin-top: 18px; }
.address-map svg { display: block; width: 100%; height: auto; min-height: 72px; }
.address-lane { fill: var(--accent-bg); stroke: var(--line); }
.address-label { fill: var(--muted); font: 9px var(--mono); }
.address-register { fill: var(--accent); stroke: var(--bg); stroke-width: 1; cursor: pointer; }
.address-register:hover, .address-register:focus { filter: brightness(1.15); stroke-width: 2; }
.address-register-label { fill: #fff; font: 9px var(--mono); pointer-events: none; }
.address-map-note { color: var(--muted); font-size: 11px; margin: 6px 0; }
@media (max-width: 800px) { .overview-columns { grid-template-columns: 1fr; } }
#filters { padding: 6px 10px; border-bottom: 1px solid var(--line); display: none; flex-wrap: wrap; gap: 4px; }
#filters label { font-size: 11px; display: inline-flex; gap: 3px; align-items: center; margin-right: 8px; cursor: pointer; }
.loadmore { position: absolute; left: 0; right: 0; height: 28px; display: flex; align-items: center; justify-content: center; color: var(--accent); cursor: pointer; font-size: 12px; }
a { color: var(--accent); }
kbd { border: 1px solid var(--line); border-radius: 3px; padding: 0 4px; font-size: 11px; }
</style>
</head>
<body>
<header>
  <h1>PeakRDL-check</h1>
  <input id="search" type="search" placeholder="Search registers, fields, descriptions… (/)" aria-label="Search">
  <input id="addr-filter" type="text" placeholder="addr range: 0x1000:0x2fff" aria-label="Address range filter">
  <span class="meta" id="meta-line">loading…</span>
</header>
<main>
  <div id="left">
    <div id="tabs" role="tablist">
      <button id="tab-overview" class="active" role="tab">Overview</button>
      <button id="tab-tree" role="tab">Hierarchy</button>
      <button id="tab-results" role="tab">Results</button>
      <button id="tab-changes" role="tab">Changes</button>
    </div>
    <div id="filters"></div>
    <div id="list" tabindex="0" role="listbox" aria-label="Entities"><div class="spacer"></div></div>
  </div>
  <div id="splitter" role="separator" aria-orientation="vertical" aria-label="Resize navigation panel"
       aria-valuemin="20" aria-valuemax="80" aria-valuenow="46" tabindex="0"
       title="Drag to resize; double-click to reset"></div>
  <div id="detail"><div class="status">Select an entity, search, or paste a deep link.</div></div>
</main>
<script src="/viewer.js"></script>
</body>
</html>
