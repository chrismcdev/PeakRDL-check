name: "PeakRDL-check register interface review"
description: >
  Semantic diff of SystemRDL register specifications between two revisions.
  Classifies changes (breaking/behavioural/compatible/documentation), writes
  a job summary, emits source annotations, uploads a reviewable report, and
  fails the job according to the configured severity threshold.
branding:
  icon: "cpu"
  color: "blue"

inputs:
  base-ref:
    description: "Base git ref/sha to compare from"
    required: true
  head-ref:
    description: "Head git ref/sha to compare to"
    required: true
  rdl-glob:
    description: >
      Glob for SystemRDL entry files. Changed `include fragments are diffed
      through the entry files that include them, never standalone.
    default: "**/*.rdl"
  fail-on:
    description: "Severity threshold: breaking | behavioural | validation-error | none"
    default: "breaking"
  policy:
    description: "Optional path to a severity policy JSON"
    default: ""
  mode:
    description: >
      "review" (default) diffs base-ref..head-ref. "prime" builds and caches
      an index for every entry file at head-ref without diffing — run it on
      pushes to the default branch (with base-ref == head-ref == the pushed
      sha) so pull-request reviews always start from a warm base index.
    default: "review"
  python-version:
    description: "Python version for the toolchain"
    default: "3.12"

outputs:
  breaking-count:
    description: "Number of breaking changes detected"
    value: ${{ steps.review.outputs.breaking-count }}
  report-path:
    description: "Path to the JSON diff report artifact"
    value: ${{ steps.review.outputs.report-path }}

runs:
  using: "composite"
  steps:
    - uses: actions/setup-python@v6
      with:
        python-version: ${{ inputs.python-version }}

    - name: Install PeakRDL-check
      shell: bash
      run: pip install "${{ github.action_path }}/.."

    # Base indexes are immutable per (entry, base sha, storage schema): a
    # warm cache means the review never recompiles the base revision, and
    # the head revision is spliced incrementally on top. The "s2" segment is
    # the storage schema version and must move with STORAGE_SCHEMA_VERSION.
    - name: Restore base index cache
      uses: actions/cache@v4
      with:
        path: peakrdl-check-index-cache
        key: peakrdl-check-index-s2-${{ inputs.base-ref }}

    - name: Semantic review
      id: review
      shell: bash
      env:
        BASE_REF: ${{ inputs.base-ref }}
        HEAD_REF: ${{ inputs.head-ref }}
        RDL_GLOB: ${{ inputs.rdl-glob }}
        FAIL_ON: ${{ inputs.fail-on }}
        POLICY: ${{ inputs.policy }}
        MODE: ${{ inputs.mode }}
        PEAKRDL_CHECK_INDEX_CACHE: peakrdl-check-index-cache
      run: python "${{ github.action_path }}/review.py"

    - name: Upload review artifacts
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: peakrdl-check-report
        path: peakrdl-check-out/
        if-no-files-found: ignore
